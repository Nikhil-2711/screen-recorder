<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Screen Recorder</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <main class="container">

        <!-- =========================
             Header
        ========================== -->

        <header class="header">
            <h1>🎥 Chrome Screen Recorder</h1>
            <p>
                Record your screen and microphone directly from your browser.
            </p>
        </header>

        <!-- =========================
             Preview Section
        ========================== -->

        <section class="preview-section">

            <video
                id="preview"
                autoplay
                muted
                playsinline
            ></video>

            <div class="placeholder" id="placeholder">
                <h3>No Recording Available</h3>
                <p>Start recording to preview your screen.</p>
            </div>

        </section>

        <!-- =========================
             Recording Status
        ========================== -->

        <section class="status-section">

            <div class="status-box">

                <div class="status-item">
                    <span class="label">Status</span>

                    <span id="recordingStatus" class="status idle">
                        🔴 Idle
                    </span>
                </div>

                <div class="status-item">

                    <span class="label">
                        Recording Time
                    </span>

                    <span id="timer">
                        00:00:00
                    </span>

                </div>

            </div>

        </section>

        <!-- =========================
             Controls
        ========================== -->

        <section class="controls">

            <button id="startBtn" class="btn primary">
                ▶ Start
            </button>

            <button id="pauseBtn" class="btn warning" disabled>
                ⏸ Pause
            </button>

            <button id="resumeBtn" class="btn success" disabled>
                ▶ Resume
            </button>

            <button id="stopBtn" class="btn danger" disabled>
                ■ Stop
            </button>

            <button id="downloadBtn" class="btn secondary" disabled>
                ⬇ Download
            </button>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>
</html>
